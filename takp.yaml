description: EverQuest The Al'Kabor Project
game_slug: everquest
gogslug: ''
humblestoreid: ''
installer_slug: everquest-takp
name: "EverQuest: The Al'Kabor Project"
runner: wine
slug: everquest-takp
steamid: 205710
version: EverQuest The Al'Kabor Project
year: 1999

script:
  custom-name: The Al'Kabor Project

  files:
    - takpFile: N/A:Select the TAKP setup zip file

  game:
    arch: win32
    exe: $GAMEDIR/drive_c/Program Files/EverQuest/eqgame.exe
    args: patchme
    prefix: $GAMEDIR
    working_dir: $GAMEDIR/drive_c/Program Files/EverQuest

  installer:
    - task:
        name: create_prefix
        arch: win32
        prefix: $GAMEDIR
        description: Creating 32-bit Wine prefix

    - extract:
        file: takpFile
        dst: $GAMEDIR/drive_c/Program Files/EverQuest

    - task:
        name: winetricks
        app: corefonts
        arch: win32
        prefix: $GAMEDIR
        description: Installing core fonts
        silent: true

    - task:
        name: winetricks
        app: dinput8
        arch: win32
        prefix: $GAMEDIR
        description: Installing DirectInput 8
        silent: true

    - task:
        name: winetricks
        app: vcrun2010
        arch: win32
        prefix: $GAMEDIR
        description: Installing VC++ 2010 runtime
        silent: true

    - task:
        name: winetricks
        app: dxvk
        arch: win32
        prefix: $GAMEDIR
        description: Installing DXVK
        silent: true

    - task:
        name: set_regedit
        arch: win32
        prefix: $GAMEDIR
        description: Using bundled native D3D8 wrapper
        path: HKEY_CURRENT_USER\Software\Wine\DllOverrides
        key: d3d8
        value: native,builtin
        type: REG_SZ

    - task:
        name: set_regedit
        arch: win32
        prefix: $GAMEDIR
        description: Using native DirectInput 8
        path: HKEY_CURRENT_USER\Software\Wine\DllOverrides
        key: dinput8
        value: native,builtin
        type: REG_SZ

    - write_config:
        file: $GAMEDIR/drive_c/Program Files/EverQuest/eqclient.ini
        data:
          Defaults:
            AttackOnAssist: FALSE

  wine:
    version: wine-ge-8-26-x86_64
    arch: win32
    dxvk: true
    dgvoodoo2: false
